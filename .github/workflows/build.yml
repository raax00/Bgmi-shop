name: Build and Release Flutter APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      # =========================================================
      # 🔥 THE ULTIMATE FIX: Python Script to Force V2 Embedding
      # =========================================================
      - name: Force Android V2 Embedding
        run: |
          python -c "
          import os
          path = 'android/app/src/main/AndroidManifest.xml'
          if os.path.exists(path):
              with open(path, 'r', encoding='utf-8') as f:
                  content = f.read()
              
              # 1. Inject flutterEmbedding if missing
              if 'flutterEmbedding' not in content:
                  content = content.replace('</application>', '    <meta-data android:name=\"flutterEmbedding\" android:value=\"2\" />\n    </application>')
                  print('✅ Injected flutterEmbedding meta-data.')
              
              # 2. Fix the application name issue
              if 'io.flutter.app.FlutterApplication' in content:
                  content = content.replace('android:name=\"io.flutter.app.FlutterApplication\"', 'android:name=\"\${applicationName}\"')
                  print('✅ Fixed Application Name.')
                  
              with open(path, 'w', encoding='utf-8') as f:
                  f.write(content)
          else:
              print('❌ AndroidManifest.xml not found!')
          "
          
          # 3. Fix MainActivity imports using bash find
          find android/app/src/main -name "MainActivity.*" -type f -exec sed -i 's/io.flutter.app.FlutterActivity/io.flutter.embedding.android.FlutterActivity/g' {} +
          echo "✅ Fixed MainActivity imports."

      # =========================================================
      # SECURE INJECTION OF GOOGLE SERVICES JSON
      # =========================================================
      - name: Inject Google Services JSON
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "❌ Error: GOOGLE_SERVICES_JSON secret is empty in GitHub Secrets!"
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          echo "✅ Successfully injected google-services.json"

      # Install dependencies (Ab ye 100% pass hoga)
      - name: Get Flutter Dependencies
        run: flutter pub get

      # Build the App
      - name: Build Release APK
        run: flutter build apk --release

      # Upload the final APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DreamStore-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
