name: Build and Release Flutter APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      # =========================================================
      # 🚀 THE ULTIMATE FIX: Clean CRLF & Force V2 Embedding
      # =========================================================
      - name: Fix Windows Line Endings & Force V2 Embedding
        run: |
          # Install dos2unix to fix hidden Windows formatting characters
          sudo apt-get update && sudo apt-get install -y dos2unix
          
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          
          if [ -f "$MANIFEST" ]; then
            # Convert Windows CRLF to Linux LF
            dos2unix "$MANIFEST"
            
            # Remove any broken/duplicate flutterEmbedding tags
            sed -i '/flutterEmbedding/d' "$MANIFEST"
            
            # Fix Application Name from V1 to V2
            sed -i 's/android:name="io.flutter.app.FlutterApplication"/android:name="${applicationName}"/g' "$MANIFEST"
            
            # Force inject V2 Meta-data exactly before the closing </application> tag
            sed -i '/<\/application>/i \        <meta-data android:name="flutterEmbedding" android:value="2" />' "$MANIFEST"
            echo "✅ Manifest cleaned and V2 Embedding injected successfully."
          else
            echo "❌ AndroidManifest.xml not found!"
          fi

          # Fix MainActivity imports and CRLF issues
          find android/app/src/main -name "MainActivity.*" -type f -exec dos2unix {} +
          find android/app/src/main -name "MainActivity.*" -type f -exec sed -i 's/io.flutter.app.FlutterActivity/io.flutter.embedding.android.FlutterActivity/g' {} +
          echo "✅ MainActivity files patched successfully."

      # =========================================================
      # 🔐 SECURE INJECTION OF GOOGLE SERVICES JSON
      # =========================================================
      - name: Inject Google Services JSON
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "❌ Error: GOOGLE_SERVICES_JSON secret is empty in GitHub Secrets!"
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          echo "✅ Successfully injected google-services.json"

      # Install dependencies (Ab yeh bina error ke pass hoga!)
      - name: Get Flutter Dependencies
        run: flutter pub get

      # Build the App
      - name: Build Release APK
        run: flutter build apk --release

      # Upload the final APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DreamStore-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
