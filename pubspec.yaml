name: dream_store
description: A premium game top-up application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase Dependencies
  firebase_core: ^2.24.2
  firebase_auth: ^4.14.1
  cloud_firestore: ^4.13.1
  
  # UI & Utilities
  cupertino_icons: ^1.0.6
  url_launcher: ^6.2.1 # Required for UPI App redirection

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
